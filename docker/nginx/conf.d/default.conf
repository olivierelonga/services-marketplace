server {
    listen 80;  # Nginx listens on port 80 (standard HTTP port)
    index index.php index.html;  # Default file to serve
    root /var/www/html/public;  # Laravel public directory as web root

    location / {
        try_files $uri $uri/ /index.php?$query_string;  
        # Try static file, then folder, fallback to Laravel (index.php)
    }

    location ~ \.php$ {
        include fastcgi_params;  # Load default FastCGI params
        fastcgi_pass app:9000;  # Send PHP requests to PHP-FPM container
        fastcgi_index index.php;  # Default PHP file to serve
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # Tell PHP the correct file path and document root
    }

    location ~ /\.ht {
        deny all;  # Block access to .htaccess and hidden files
    }
}
